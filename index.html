<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fateful Glance · 作品集</title>
    <link rel="icon" href="https://s3.bmp.ovh/2026/07/01/5nyGYdOG.png" type="image/png" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        :root {
            --bg-primary: #0a1425;
            --bg-secondary: #111d38;
            --bg-card: rgba(15, 26, 52, 0.75);
            --text-primary: #f0f4ff;
            --text-secondary: rgba(180, 210, 255, 0.85);
            --text-muted: rgba(160, 190, 240, 0.55);
            --accent: #5b9cff;
            --accent-light: #a0c4ff;
            --accent-glow: rgba(91, 156, 255, 0.35);
            --border-color: rgba(91, 156, 255, 0.18);
            --shadow: 0 20px 60px rgba(0, 0, 0, 0.6);
            --radius: 20px;
            --transition: 0.4s cubic-bezier(0.23, 1, 0.32, 1);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* 星空背景 */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(91, 156, 255, 0.12) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(120, 180, 255, 0.08) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(91, 156, 255, 0.1) 0%, transparent 60%);
            z-index: 0;
            animation: cosmicShift 60s linear infinite;
        }

        body::after {
            content: '';
            position: fixed;
            inset: 0;
            background-image: 
                radial-gradient(white 0.8px, transparent 1px),
                radial-gradient(white 0.6px, transparent 1px);
            background-size: 80px 80px, 120px 120px;
            opacity: 0.07;
            animation: starsTwinkle 25s linear infinite;
            z-index: 1;
            pointer-events: none;
        }

        @keyframes cosmicShift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(30px, 20px); }
        }

        @keyframes starsTwinkle {
            0%, 100% { opacity: 0.07; }
            50% { opacity: 0.12; }
        }

        .container {
            max-width: 1080px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            z-index: 2;
            padding: 40px 20px;
            animation: fadeUp 1s ease-out forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* 导航栏 */
        .nav-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 60px;
        }

        .lang-bar {
            display: flex;
            gap: 8px;
        }

        .lang-btn {
            padding: 8px 20px;
            border: 1.5px solid var(--border-color);
            border-radius: 50px;
            background: rgba(255,255,255,0.03);
            color: var(--text-muted);
            font-size: 13.5px;
            font-weight: 500;
            cursor: pointer;
            transition: var(--transition);
        }

        .lang-btn:hover {
            border-color: var(--accent);
            color: var(--text-primary);
            background: rgba(91, 156, 255, 0.1);
        }

        .lang-btn.active {
            background: var(--accent);
            border-color: var(--accent);
            color: #0a1425;
            font-weight: 600;
            box-shadow: 0 0 20px var(--accent-glow);
        }

        /* 主标题 */
        .hero {
            text-align: center;
            margin-bottom: 80px;
            position: relative;
        }

        .logo-text {
            font-size: 58px;
            font-weight: 700;
            letter-spacing: -2px;
            background: linear-gradient(90deg, #f0f4ff, var(--accent-light), #f0f4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            text-shadow: 0 0 40px var(--accent-glow);
        }

        .logo-sub {
            font-size: 15px;
            color: var(--text-muted);
            letter-spacing: 6px;
            font-weight: 300;
            opacity: 0.75;
        }

        .hero::after {
            content: '';
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            width: 120px;
            height: 2px;
            background: linear-gradient(to right, transparent, var(--accent), transparent);
        }

        /* 项目卡片 */
        .projects {
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .entry-group {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }

        .project-card {
            background: var(--bg-card);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--border-color);
            border-radius: var(--radius);
            padding: 32px 36px;
            transition: var(--transition);
            text-decoration: none;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 28px;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }

        .project-card::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(91, 156, 255, 0.06), transparent);
            opacity: 0;
            transition: var(--transition);
        }

        .project-card:hover::before {
            opacity: 1;
        }

        .project-card:hover {
            border-color: var(--accent);
            transform: translateY(-8px) scale(1.01);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7), 
                        0 0 60px var(--accent-glow);
        }

        .project-card .icon-box {
            font-size: 42px;
            flex-shrink: 0;
            width: 72px;
            height: 72px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(91, 156, 255, 0.1);
            border-radius: 18px;
            border: 1px solid rgba(91, 156, 255, 0.2);
            transition: var(--transition);
        }

        .project-card:hover .icon-box {
            transform: scale(1.1) rotate(8deg);
            background: rgba(91, 156, 255, 0.18);
        }

        .project-card .info {
            flex: 1;
            min-width: 0;
        }

        .project-card .title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: -0.3px;
        }

        .project-card .title .ext-link {
            font-size: 13px;
            color: var(--text-muted);
            background: rgba(91, 156, 255, 0.1);
            padding: 2px 12px;
            border-radius: 20px;
            margin-left: 10px;
            vertical-align: middle;
        }

        .project-card .desc {
            font-size: 15.5px;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 16px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 500;
            margin-top: 10px;
            letter-spacing: 0.3px;
        }

        .status-online { background: rgba(74, 222, 128, 0.15); color: #5de8a0; border: 1px solid rgba(74, 222, 128, 0.2); }
        .status-dev { background: rgba(251, 191, 36, 0.12); color: #fcd34d; border: 1px solid rgba(251, 191, 36, 0.2); }
        .status-coming { background: rgba(91, 156, 255, 0.1); color: var(--accent-light); border: 1px solid rgba(91, 156, 255, 0.2); }
        .status-new { background: rgba(165, 243, 252, 0.15); color: #67e8f9; border: 1px solid rgba(165, 243, 252, 0.25); }
        .status-disabled { background: rgba(160, 190, 240, 0.08); color: var(--text-muted); border: 1px solid rgba(160, 190, 240, 0.15); }

        .project-card .arrow {
            font-size: 22px;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .project-card:hover .arrow {
            color: var(--accent-light);
            transform: translateX(8px);
        }

        .project-card.disabled {
            opacity: 0.65;
            cursor: default;
        }

        .project-card.disabled:hover {
            transform: none;
            box-shadow: var(--shadow);
        }

        /* 页脚 */
        .footer {
            text-align: center;
            margin-top: 100px;
            color: var(--text-muted);
            font-size: 14px;
            padding-top: 40px;
            border-top: 1px solid var(--border-color);
        }

        .footer .heart {
            color: #ff6b6b;
            animation: heartbeat 1.6s ease-in-out infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.25); }
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .logo-text { font-size: 42px; }
            .project-card {
                padding: 24px;
                gap: 20px;
            }
            .project-card .icon-box {
                width: 58px;
                height: 58px;
                font-size: 32px;
            }
            .hero { margin-bottom: 50px; }
        }

        @media (max-width: 480px) {
            .project-card { flex-direction: column; align-items: flex-start; }
            .project-card .arrow { align-self: flex-end; margin-top: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="nav-bar">
            <div></div>
            <div class="lang-bar">
                <button class="lang-btn active" data-lang="zh" onclick="setLang('zh')">中文</button>
                <button class="lang-btn" data-lang="en" onclick="setLang('en')">English</button>
            </div>
        </div>

        <header class="hero">
            <div class="logo-text">Fateful Glance</div>
            <div class="logo-sub">✦ Fateglance ✦</div>
        </header>

        <div class="projects">
            <!-- 新链接：出勤日报 & 施工日报 -->
            <div class="entry-group">
                <a href="https://ocndbrvgekv1.feishu.cn/share/base/form/shrcnZ2d8fNrL81x6Ve5oWdSWwd" class="project-card" target="_blank" rel="noopener noreferrer">
                    <div class="icon-box">📋</div>
                    <div class="info">
                        <div class="title">
                            <span data-zh="出勤日报" data-en="Attendance Daily Report">出勤日报</span>
                            <span class="ext-link">🔗</span>
                        </div>
                        <div class="desc" data-zh="班组出勤 · 工种统计 · 人数填报"

                            班组出勤 · 工种统计 · 人数填报
                        </div>
                        <span class="status-badge status-online" data-zh="● 在线表单" data-en="● Live Form">● 在线表单</span>
                    </div>
                    <span class="arrow">→</span>
                </a>

                <a href="https://ocndbrvgekv1.feishu.cn/share/base/form/shrcnR0RbrGsbkNUF9ieOHGNUWF" class="project-card" target="_blank" rel="noopener noreferrer">
                    <div class="icon-box">🚧</div>
                    <div class="info">
                        <div class="title">
                            <span data-zh="施工日报" data-en="Construction Daily Report">施工日报</span>
                            <span class="ext-link">🔗</span>
                        </div>
                        <div class="desc" data-zh="区域·班组·位号 · 工作描述与工时" 
                             data-en="Area · Team · Tag No. · Work description & manhours">
                            区域·班组·位号 · 工作描述与工时
                        </div>
                        <span class="status-badge status-new" data-zh="● 最新表单" data-en="● Latest Form">● 最新表单</span>
                    </div>
                    <span class="arrow">→</span>
                </a>
            </div>

            <!-- 数据可视化仪表板（已更新为有效链接） -->
            <a href="https://ocndbrvgekv1.feishu.cn/share/base/dashboard/shrcnb1lvtFfLo3yoUCSPhv5QVb" class="project-card" target="_blank" rel="noopener noreferrer">
                <div class="icon-box">📊</div>
                <div class="info">
                    <div class="title">
                        <span data-zh="数据可视化仪表板" data-en="Data Visualization Dashboard">数据可视化仪表板</span>
                        <span class="ext-link">🔗</span>
                    </div>
                    <div class="desc" data-zh="动态交互图表 · 实时监控大屏 · 多维度数据洞察" 
                         data-en="Dynamic interactive charts · Real-time monitoring · Multi-dimensional insights">
                        动态交互图表 · 实时监控大屏 · 多维度数据洞察
                    </div>
                    <span class="status-badge status-online" data-zh="● 在线仪表板" data-en="● Live Dashboard">● 在线仪表板</span>
                </div>
                <span class="arrow">→</span>
            </a>

            <!-- 停用的旧项目 -->
            <div class="project-card disabled">
                <div class="icon-box">📋</div>
                <div class="info">
                    <div class="title" data-zh="施工日报填报系统（已停用）" data-en="Daily Report System (Deprecated)">施工日报填报系统（已停用）</div>
                    <div class="desc" data-zh="此版本已停用，请使用上方新版链接" 
                         data-en="This version is deprecated, please use the new links above">
                        此版本已停用，请使用上方新版链接
                    </div>
                    <span class="status-badge status-disabled" data-zh="● 已停用" data-en="● Deprecated">● 已停用</span>
                </div>
                <span class="arrow">→</span>
            </div>

            <div class="project-card disabled">
                <div class="icon-box">🌌</div>
                <div class="info">
                    <div class="title" data-zh="更多作品即将启航" data-en="More Creations Coming Soon">更多作品即将启航</div>
                    <div class="desc" data-zh="持续探索 · 敬请期待下一段命运的凝视" 
                         data-en="Keep exploring · Stay tuned for the next fateful glance">
                        持续探索 · 敬请期待下一段命运的凝视
                    </div>
                    <span class="status-badge status-coming" data-zh="● 规划中" data-en="● Planning">● 规划中</span>
                </div>
                <span class="arrow">→</span>
            </div>
        </div>

        <footer class="footer">
            <p>
                <span data-zh="© 2026 Zack Leo ❤️ Kepler Miao" data-en="© 2026 Zack Leo ❤️ Kepler Miao">
                    © 2026 Zack Leo ❤️ Kepler Miao
                </span>
            </p>
        </footer>
    </div>

    <script>
        let currentLang = 'zh';
        
        function setLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.toggle('active', btn.dataset.lang === lang);
            });
            document.querySelectorAll('[data-zh][data-en]').forEach(el => {
                el.textContent = el.dataset[lang];
            });
            localStorage.setItem('preferred_lang', lang);
        }

        // 加载保存的语言
        const saved = localStorage.getItem('preferred_lang');
        if (saved === 'zh' || saved === 'en') setLang(saved);

        // L 键切换语言
        document.addEventListener('keydown', (e) => {
            if ((e.key.toLowerCase() === 'l') && !e.ctrlKey && !e.metaKey) {
                setLang(currentLang === 'zh' ? 'en' : 'zh');
                e.preventDefault();
            }
        });

        console.log('%c🚀 Fateful Glance 已优雅加载', 'color:#5b9cff; font-size:14px;');
        console.log('%c💡 按 L 键切换语言', 'color:#a0c4ff; font-size:13px;');
    </script>
</body>
</html>
